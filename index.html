<!DOCTYPE html><html>
<head>
  <title>21-Day Break Tracker</title>
</head><body><h1>21-Day Break Tracker</h1><button id="loginBtn">
Login With Google
</button><p id="userInfo">
Not Logged In
</p><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyCCbNxWraD-AgfcKHBSSwaWembq2zleiok",

  authDomain: "break-tracker-ea401.firebaseapp.com",

  projectId: "break-tracker-ea401",

  storageBucket: "break-tracker-ea401.firebasestorage.app",

  messagingSenderId: "996988631234",

  appId: "1:996988631234:web:0907369773652e8b84e35b"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").onclick = async () => {

  const result = await signInWithPopup(auth, provider);

  const user = result.user;

  await setDoc(
    doc(db, "users", user.uid),
    {
      name: user.displayName,
      email: user.email,
      currentDay: 1,
      cycleNumber: 1,
      cycleStartDate: new Date().toISOString()
    },
    { merge: true }
  );

  document.getElementById("userInfo").innerText =
    "Welcome " + user.displayName;
};

</script></body>
</html>
